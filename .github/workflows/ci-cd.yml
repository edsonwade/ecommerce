name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/ecommerce

jobs:

  # ============================================================
  # Detect which services changed (path-based triggers)
  # ============================================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.compute.outputs.services }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gateway-api-service: [gateway-api-service/**]
            authentication-service: [authentication-service/**]
            customer-service: [customer-service/**]
            product-service: [product-service/**]
            order-service: [order-service/**]
            payment-service: [payment-service/**]
            cart-service: [cart-service/**]
            notification-service: [notification-service/**]
            config-service: [config-service/**]
            discovery-service: [discovery-service/**]
            global:
              - 'pom.xml'
              - '.github/**'
              - 'helm/**'
              - 'tenant-context/**'
      - id: compute
        run: |
          SERVICES='${{ steps.filter.outputs.changes }}'
          GLOBAL='${{ steps.filter.outputs.global }}'
          ALL='["gateway-api-service","authentication-service","customer-service","product-service","order-service","payment-service","cart-service","notification-service","config-service","discovery-service"]'
          if [ "$GLOBAL" = "true" ] || [ "$SERVICES" = "[]" ]; then
            echo "services=$ALL" >> $GITHUB_OUTPUT
          else
            echo "services=$SERVICES" >> $GITHUB_OUTPUT
          fi

  # ============================================================
  # Frontend — lint, build, unit tests, E2E (Playwright)
  # ============================================================
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript build
        run: npm run build

      - name: Unit tests (Vitest)
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: E2E tests (Playwright)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ============================================================
  # Build & Unit Tests — parallel per changed service
  # ============================================================
  build:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build and unit test — ${{ matrix.service }}
        run: mvn clean package -pl ${{ matrix.service }} -am -DskipTests=false
        env:
          MAVEN_OPTS: -Xmx1024m

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.service }}
          path: ${{ matrix.service }}/target/surefire-reports/

  # ============================================================
  # Integration Tests (Testcontainers — requires Docker)
  # ============================================================
  integration-test:
    needs: [detect-changes, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Run integration tests — ${{ matrix.service }}
        run: mvn verify -pl ${{ matrix.service }} -am -Dsurefire.skip=true
        env:
          MAVEN_OPTS: -Xmx1024m
        continue-on-error: true   # integration tests may not exist for all services

  # ============================================================
  # Security Scanning
  # ============================================================
  security-scan:
    needs: [detect-changes, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build Docker image for scanning
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:scan \
            -f ./${{ matrix.service }}/Dockerfile .

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:scan
          format: sarif
          output: trivy-results-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results-${{ matrix.service }}.sarif

  # ============================================================
  # Build & Push Docker Images (git SHA tag)
  # ============================================================
  build-push:
    needs: [detect-changes, build, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push — ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Deploy to Staging + Smoke Test + Rollback (single job —
  # Kind cluster must persist across deploy, test, and rollback)
  # ============================================================
  staging:
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Create Kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: ecommerce-staging
          config: .github/kind-config.yaml

      # Wait for the API server to be fully ready before Helm connects.
      # Without this, Helm hits the K8s client rate limiter on a freshly
      # started single-node Kind cluster → "context deadline exceeded".
      - name: Wait for Kind node to be Ready
        run: |
          kubectl wait --for=condition=Ready node --all --timeout=120s
          kubectl cluster-info

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      # No --wait: services will never reach Running in Kind (no databases,
      # no Kafka, no Vault). --wait would poll the API server until the
      # 10-minute timeout fires, causing "client rate limiter" errors.
      - name: Deploy to staging (Kind)
        id: deploy
        run: |
          helm upgrade --install ecommerce ./helm/ecommerce \
            --namespace ecommerce-staging \
            --create-namespace \
            -f helm/ecommerce/values-staging.yaml \
            --set global.imageRegistry=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }} \
            --set global.namespace=ecommerce-staging \
            --timeout 2m

      # Smoke tests: verify chart manifests were accepted by the API server.
      # HTTP health checks are not possible in Kind CI (services need real
      # databases/Kafka/Vault which are not present in the cluster).
      - name: Smoke test — all Deployments created
        run: |
          kubectl get deployments -n ecommerce-staging -o wide
          EXPECTED=10
          ACTUAL=$(kubectl get deployments -n ecommerce-staging --no-headers | wc -l)
          echo "Expected $EXPECTED deployments, found $ACTUAL"
          [ "$ACTUAL" -eq "$EXPECTED" ]

      - name: Smoke test — all Secrets created
        run: |
          kubectl get secrets -n ecommerce-staging -o wide
          EXPECTED=10
          ACTUAL=$(kubectl get secrets -n ecommerce-staging \
            --field-selector type=Opaque --no-headers | wc -l)
          echo "Expected $EXPECTED Opaque secrets, found $ACTUAL"
          [ "$ACTUAL" -eq "$EXPECTED" ]

      - name: Smoke test — all Services created
        run: kubectl get services -n ecommerce-staging -o wide

      - name: Rollback on smoke test failure
        if: failure() && steps.deploy.outcome == 'success'
        run: |
          REVISIONS=$(helm list -n ecommerce-staging --filter 'ecommerce' -o json | jq '.[0].revision | tonumber')
          if [ "$REVISIONS" -gt 1 ]; then
            helm rollback ecommerce --namespace ecommerce-staging
          else
            echo "No previous version to rollback to (current revision is $REVISIONS)"
          fi

  # ============================================================
  # Deploy to Production (manual approval gate)
  # ============================================================
  deploy-prod:
    needs: staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production   # requires manual approval in GitHub Environments settings
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      - name: Deploy to production
        run: |
          helm upgrade --install ecommerce ./helm/ecommerce \
            --namespace ecommerce \
            --create-namespace \
            -f helm/ecommerce/values-production.yaml \
            --set global.imageRegistry=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }} \
            --set global.namespace=ecommerce \
            --timeout 15m \
            --wait \
            --atomic   # auto-rollback on failure
        env:
          KUBECONFIG: ${{ secrets.PROD_KUBECONFIG }}
