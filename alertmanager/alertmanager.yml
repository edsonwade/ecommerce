# ==============================================================
# Alertmanager Configuration
# Routes alerts to Slack and/or email
# Set SLACK_WEBHOOK_URL env var for Slack integration
# ==============================================================
global:
  resolve_timeout: 5m
  smtp_smarthost: 'mailhog:1025'
  smtp_from: 'alertmanager@vanilsonshop.io'
  smtp_require_tls: false

  # Slack default URL — set SLACK_WEBHOOK_URL env var for real Slack integration
  slack_api_url: 'https://hooks.slack.com/services/placeholder'

route:
  group_by: ['alertname', 'job', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 0s
      group_interval: 1m
      repeat_interval: 1h
      continue: false
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      continue: false

receivers:
  - name: 'default'
    email_configs:
      - to: 'ops@vanilsonshop.io'
        headers:
          Subject: '[eCommerce] Alert: {{ .GroupLabels.alertname }}'

  - name: 'critical-alerts'
    slack_configs:
      - channel: '#incidents'
        send_resolved: true
        title: ':fire: CRITICAL: {{ .GroupLabels.alertname }}'
        title_link: 'http://grafana:3000'
        text: |
          *Service:* {{ .GroupLabels.job }}
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        color: 'danger'
    email_configs:
      - to: 'oncall@vanilsonshop.io'
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }}'

  - name: 'warning-alerts'
    slack_configs:
      - channel: '#alerts'
        send_resolved: true
        title: ':warning: WARNING: {{ .GroupLabels.alertname }}'
        title_link: 'http://grafana:3000'
        text: |
          *Service:* {{ .GroupLabels.job }}
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        color: 'warning'
    email_configs:
      - to: 'ops@vanilsonshop.io'
        headers:
          Subject: '[WARNING] {{ .GroupLabels.alertname }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'job']
