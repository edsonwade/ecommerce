# ==============================================================
# Alertmanager Configuration
# Routes alerts to Slack and/or email
# Set SLACK_WEBHOOK_URL env var for Slack integration
# ==============================================================
global:
  resolve_timeout: 5m
  smtp_smarthost: 'mailhog:1025'
  smtp_from: 'alertmanager@vanilsonshop.io'
  smtp_require_tls: false

  # Slack integration is DISABLED: the previous placeholder URL made every failed
  # notify log the full Slack HTML error page (189 MB log -> promtail 100%+ CPU).
  # To enable for real, restore slack_api_url with a genuine webhook AND re-add
  # slack_configs to the receivers below.

route:
  group_by: ['alertname', 'job', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 0s
      group_interval: 1m
      repeat_interval: 1h
      continue: false
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      continue: false

receivers:
  - name: 'default'
    email_configs:
      - to: 'ops@vanilsonshop.io'
        headers:
          Subject: '[eCommerce] Alert: {{ .GroupLabels.alertname }}'

  - name: 'critical-alerts'
    email_configs:
      - to: 'oncall@vanilsonshop.io'
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }}'

  - name: 'warning-alerts'
    email_configs:
      - to: 'ops@vanilsonshop.io'
        headers:
          Subject: '[WARNING] {{ .GroupLabels.alertname }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'job']
