# --- Cart operations ---
cart.not.found=Carrinho com ID [{0}] não encontrado. Inicie uma nova sessão de compra.
cart.item.not.found=Produto com ID [{0}] não existe no carrinho [{1}].
cart.empty=O carrinho [{0}] está vazio.
cart.item.quantity.invalid=A quantidade do produto [{0}] deve ser maior que zero.
cart.customer.id.required=O ID do cliente é obrigatório para aceder ao carrinho.
