cart.log.created=Carrinho criado: cartId=[{0}] customerId=[{1}]
cart.log.item.added=Item adicionado ao carrinho: cartId=[{0}] productId=[{1}] qty=[{2}]
cart.log.item.removed=Item removido do carrinho: cartId=[{0}] productId=[{1}]
cart.log.item.updated=Item actualizado no carrinho: cartId=[{0}] productId=[{1}] novaQty=[{2}]
cart.log.cleared=Carrinho limpo: cartId=[{0}]
cart.log.fetched=Carrinho obtido: cartId=[{0}] totalItens=[{1}]
cart.log.expired=Carrinho expirado e removido do Redis: cartId=[{0}]
cart.log.checkout=Checkout do carrinho: cartId=[{0}] customerId=[{1}] totalItens=[{2}]
