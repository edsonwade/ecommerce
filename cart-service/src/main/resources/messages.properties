# ============================================================
# CART SERVICE — messages.properties
# ============================================================

# --- Cart operations ---
cart.not.found=Cart with ID [{0}] not found. Please start a new shopping session.
cart.item.not.found=Product with ID [{0}] does not exist in cart [{1}].
cart.empty=Cart [{0}] is empty.
cart.item.quantity.invalid=Product [{0}] quantity must be greater than zero.
cart.item.exceeds.stock=Product [{0}] quantity cannot exceed available stock of [{1}].
cart.item.stock.invalid=Available quantity must be a positive integer.
cart.customer.id.required=Customer ID is required to access the cart.
cart.product.id.required=Product ID is required.

# --- Checkout ---
cart.checkout.empty=Cannot checkout an empty cart.
cart.checkout.success=Checkout started successfully for cart [{0}]. Total: [{1}] items.

# --- Access control ---
cart.access.denied=You are not allowed to access this cart. Only the owner or an ADMIN can make changes.

# --- Generic errors ---
cart.error.internal=Internal error in cart service. Reference: [{0}]
cart.validation.failed=Invalid data in cart request.

# --- Logs ---
cart.log.created=Cart created: cartId=[{0}] customerId=[{1}]
cart.log.item.added=Item added to cart: cartId=[{0}] productId=[{1}] qty=[{2}]
cart.log.item.removed=Item removed from cart: cartId=[{0}] productId=[{1}]
cart.log.item.updated=Item updated in cart: cartId=[{0}] productId=[{1}] newQty=[{2}]
cart.log.cleared=Cart cleared: cartId=[{0}]
cart.log.fetched=Cart retrieved: cartId=[{0}] totalItems=[{1}]
cart.log.expired=Cart expired and removed from Redis: cartId=[{0}]
cart.log.checkout=Cart checkout: cartId=[{0}] customerId=[{1}] totalItems=[{2}]
