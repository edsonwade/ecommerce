server:
  port: 8085
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/auth_db
    username: ${POSTGRES_USERNAME:vanilson}
    password: ${POSTGRES_PASSWORD:vanilson}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 120000
      leak-detection-threshold: 60000
      pool-name: AuthServiceHikariPool
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    enabled: true
    baseline-version: 0
    repair: true

  # Mail — forgot-password reset link. In Docker, MAIL_* default to the Mailtrap sandbox
  # inbox (sandbox.smtp.mailtrap.io:2525, auth + STARTTLS); set creds in .env. Switch back
  # to MailHog by setting MAIL_HOST=mailhog MAIL_PORT=1025 MAIL_SMTP_AUTH=false. The bare
  # defaults below target localhost MailHog for non-Docker local runs.
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:false}
        transport:
          protocol: smtp

eureka:
  client:
    service-url:
      defaultZone: "http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:eureka-secret-2024}@${EUREKA_HOST:discovery-service}:8761/eureka/"
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

# Resilience4j — circuit breaker for the customer-registration Feign backfill call
resilience4j:
  circuitbreaker:
    instances:
      customer-registration:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3s

# Explicit Feign timeouts — without these a hung customer-service blocks login
# threads for the 60s Feign default
feign:
  client:
    config:
      default:
        connect-timeout: 3000
        read-timeout: 5000

# CORS — explicit origin allowlist (wildcard + credentials is a CSRF-equivalent hole)
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5173,http://localhost:3000,http://localhost:8222}
  # Forgot-password flow
  email:
    provider: ${EMAIL_PROVIDER:smtp}        # 'smtp' (MailHog/SMTP) today; swap for a real API sender later
    from: ${EMAIL_FROM:noreply@vanilsonshop.io}
  password-reset:
    token-ttl: ${PASSWORD_RESET_TTL:PT30M}  # ISO-8601 duration — link valid for 30 minutes
    reset-url-base: ${PASSWORD_RESET_URL_BASE:http://localhost:8080/reset-password}

# JWT configuration — secret must match the Gateway's JWT secret exactly
application:
  config:
    customer-url: http://${CUSTOMER_SERVICE_HOST:customer-service}:8090/api/v1/customers
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: 86400000         # 24 hours in ms
      refresh-expiration: 604800000 # 7 days in ms

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    enable:
      hikaricp: true
  tracing:
    sampling:
      probability: 0.1  # 10% sampling — use 1.0 only in dev/debugging
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
