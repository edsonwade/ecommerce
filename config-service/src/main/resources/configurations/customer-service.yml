server:
  port: 8090
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  data:
    # MongoDB — primary storage for customer profiles
    # Sharding in production: hashed shard key on _id (customerId)
    # Replica set: rs0 with 3 nodes (1 primary, 2 secondaries)
    mongodb:
      uri: mongodb://${MONGO_USERNAME:vanilson}:${MONGO_PASSWORD:vanilson}@${MONGO_HOST:localhost}:27017/customer_db?authSource=admin
      auto-index-creation: true  # creates @Indexed indexes on startup

    # Redis L2 Cache
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis-secret-2024}
      # 2s was too tight for Docker DNS + AUTH on first connection; trips RedisReactiveHealthIndicator.
      connect-timeout: 10s
      timeout: 10s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8

  cache:
    type: redis
    redis:
      time-to-live: 600000      # 10 minutes TTL for customer data
      cache-null-values: false
    cache-names:
      - customers
      - customer-list

eureka:
  client:
    service-url:
      defaultZone: "http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:eureka-secret-2024}@${EUREKA_HOST:discovery-service}:8761/eureka/"
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 0.1  # 10% sampling — use 1.0 only in dev/debugging
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

# JWT secret — must match auth-service and gateway
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
