server:
  port: 8761
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  security:
    user:
      name: ${EUREKA_USERNAME:eureka}
      password: ${EUREKA_PASSWORD:eureka-secret-2024}

eureka:
  instance:
    hostname: ${EUREKA_HOST:localhost}
    # Must match the hostname in serviceUrl so Eureka recognises itself and does NOT
    # spawn peer-replication workers targeting its own container.
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${random.uuid}
  client:
    registerWithEureka: false
    fetchRegistry: false
    serviceUrl:
      defaultZone: "http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:eureka-secret-2024}@${EUREKA_HOST:localhost}:8761/eureka/"
  server:
    # Standalone: no cluster peers, no self-preservation, short wait on empty registry.
    enable-self-preservation: false
    wait-time-in-ms-when-sync-empty: 0
    peer-node-read-timeout-ms: 10000
    peer-node-connect-timeout-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
