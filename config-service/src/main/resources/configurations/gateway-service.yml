server:
  port: 8222
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:${REDIS_HOST:localhost}}
      port: ${SPRING_DATA_REDIS_PORT:${REDIS_PORT:6379}}
      password: ${REDIS_PASSWORD:redis-secret-2024}
      # 2s was too tight for Docker DNS + AUTH on first connection; trips RedisReactiveHealthIndicator.
      connect-timeout: 10s
      timeout: 10s
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  cloud:
    gateway:
      # ----------------------------------------------------------------
      # HTTP client connection pool — root-cause fix for the intermittent
      # 503s on the FIRST request after an idle period (product, cart AND
      # order all fell over together right after login).
      #
      # Cause: the reactor-netty pool reused keep-alive connections that the
      # backend Tomcat had already closed (default keepAliveTimeout = 60s),
      # so the write hit a half-closed socket → "connection closed
      # prematurely" (an IOException) → CircuitBreaker fallback → 503.
      # The Retry filter only retries on 502/503 *status*, not on this
      # connection exception, so the user saw the 503 on the first call and
      # success only after a manual refresh.
      #
      # Evicting idle connections well below the server keep-alive window
      # guarantees the gateway never writes to a stale socket.
      # ----------------------------------------------------------------
      httpclient:
        connect-timeout: 5000          # ms — fail fast when a backend is genuinely unreachable
        pool:
          type: elastic
          max-idle-time: 20s           # evict idle conns long before Tomcat's 60s keepAliveTimeout
          max-life-time: 120s          # hard cap on total connection lifetime
          eviction-interval: 30s       # proactively sweep idle connections from the pool

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 100
            redis-rate-limiter.burstCapacity: 200
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@tenantKeyResolver}"

      # ==============================================================
      # Routes — API v1
      #
      # Versioning strategy:
      #   - All routes serve /api/v1/** (path-based versioning)
      #   - API-Version: v1 response header injected on every route
      #   - Sunset header marks v1 deprecation once v2 goes GA
      #     (see docs/api-versioning-strategy.md for full policy)
      # ==============================================================
      routes:

        # -------------------------------------------------------
        # AUTH SERVICE — public, bypasses JWT filter
        # -------------------------------------------------------
        - id: auth-service
          uri: lb://AUTHENTICATION-SERVICE
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - AddResponseHeader=API-Version, v1
            - AddResponseHeader=Sunset, TBD
          # No rate limiting override — inherits default 100/s
          # No circuit breaker — auth must always be reachable

        # -------------------------------------------------------
        # CUSTOMER SERVICE
        # -------------------------------------------------------
        - id: customer-service
          uri: lb://CUSTOMER-SERVICE
          predicates:
            - Path=/api/v1/customers/**
          filters:
            - AddResponseHeader=API-Version, v1
            - AddResponseHeader=Sunset, TBD
            - name: CircuitBreaker
              args:
                name: customer-cb
                fallbackUri: forward:/fallback/customers
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
                methods: GET
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2

        # -------------------------------------------------------
        # CART SERVICE — high throughput, Redis-backed
        # -------------------------------------------------------
        - id: cart-service
          uri: lb://CART-SERVICE
          predicates:
            - Path=/api/v1/carts/**
          filters:
            - AddResponseHeader=API-Version, v1
            - AddResponseHeader=Sunset, TBD
            - name: CircuitBreaker
              args:
                name: cart-cb
                fallbackUri: forward:/fallback/carts
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 200
                redis-rate-limiter.burstCapacity: 400
                key-resolver: "#{@tenantKeyResolver}"
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
                methods: GET,POST,PATCH
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2

        # -------------------------------------------------------
        # ORDER SERVICE — SSE streaming (must be before generic order route)
        # No circuit breaker or retry: both would break a long-lived SSE stream.
        # response-timeout 300000ms = 5 min to match SseEmitter timeout.
        # -------------------------------------------------------
        - id: order-service-sse
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/v1/orders/*/events
          metadata:
            response-timeout: 300000
            connect-timeout: 5000
          filters:
            - AddResponseHeader=API-Version, v1
            - AddResponseHeader=Cache-Control, no-cache
            - AddResponseHeader=X-Accel-Buffering, no

        # -------------------------------------------------------
        # ORDER SERVICE
        # -------------------------------------------------------
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - AddResponseHeader=API-Version, v1
            - AddResponseHeader=Sunset, TBD
            - name: CircuitBreaker
              args:
                name: order-cb
                fallbackUri: forward:/fallback/orders
            # Retry transparently on transient connection blips (stale/cold keep-alive
            # sockets surface as PrematureCloseException, a subclass of IOException) as
            # well as on 503/502/504 statuses, BEFORE the circuit breaker counts a
            # failure. This is what stops the "503 on the first GET after login".
            # GET only — safe to replay.
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                methods: GET
                exceptions:
                  - java.io.IOException
                  - java.util.concurrent.TimeoutException
                  - org.springframework.cloud.gateway.support.TimeoutException
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
                  factor: 2

        # -------------------------------------------------------
        # ORDER LINES SERVICE (same app as order-service)
        # -------------------------------------------------------
        - id: order-lines-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/v1/order-lines/**
          filters:
            - AddResponseHeader=API-Version, v1
            - AddResponseHeader=Sunset, TBD
            - name: CircuitBreaker
              args:
                name: order-cb
                fallbackUri: forward:/fallback/orders
            # order-lines had NO retry — a single connection blip went straight to the
            # 503 fallback, so the invoice/line-items view failed intermittently.
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                methods: GET
                exceptions:
                  - java.io.IOException
                  - java.util.concurrent.TimeoutException
                  - org.springframework.cloud.gateway.support.TimeoutException
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
                  factor: 2

        # -------------------------------------------------------
        # PRODUCT SERVICE
        # -------------------------------------------------------
        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/v1/products/**
          filters:
            - AddResponseHeader=API-Version, v1
            - AddResponseHeader=Sunset, TBD
            - name: CircuitBreaker
              args:
                name: product-cb
                fallbackUri: forward:/fallback/products
            # Product list must be reliably available right after login — retry transient
            # connection blips (PrematureCloseException ⊂ IOException) and 503/502/504,
            # GET only, before the breaker falls back.
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                methods: GET
                exceptions:
                  - java.io.IOException
                  - java.util.concurrent.TimeoutException
                  - org.springframework.cloud.gateway.support.TimeoutException
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
                  factor: 2

        # -------------------------------------------------------
        # TENANT SERVICE — admin-only tenant management
        # -------------------------------------------------------
        - id: tenant-service
          uri: lb://TENANT-SERVICE
          predicates:
            - Path=/api/v1/tenants/**
          filters:
            - AddResponseHeader=API-Version, v1
            - AddResponseHeader=Sunset, TBD
            - name: CircuitBreaker
              args:
                name: tenant-cb
                fallbackUri: forward:/fallback/tenants
            - name: Retry
              args:
                retries: 1
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
                methods: GET
                backoff:
                  firstBackoff: 200ms
                  maxBackoff: 1000ms
                  factor: 2

        # -------------------------------------------------------
        # PAYMENT SERVICE — stricter rate limits (financial endpoint)
        # -------------------------------------------------------
        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - AddResponseHeader=API-Version, v1
            - AddResponseHeader=Sunset, TBD
            - name: CircuitBreaker
              args:
                name: payment-cb
                fallbackUri: forward:/fallback/payments
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 30
                key-resolver: "#{@tenantKeyResolver}"

        # -------------------------------------------------------
        # FALLBACK ROUTES
        # -------------------------------------------------------
        - id: fallback-route
          uri: no://op
          predicates:
            - Path=/fallback/**

# -------------------------------------------------------
# Resilience4j Circuit Breakers
# -------------------------------------------------------
resilience4j:
  circuitbreaker:
    instances:
      customer-cb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 5s
      cart-cb:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 70
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 5s
      order-cb:
        sliding-window-size: 20
        # Needs more failures before tripping — one cold/slow first call must not open it.
        minimum-number-of-calls: 10
        failure-rate-threshold: 60
        # Recover quickly: half-open after 5s so a brief blip doesn't 503 every call for 10s.
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 5
        slow-call-rate-threshold: 90
        # These services genuinely take ~4s on the first hit — do NOT count that as a failure.
        slow-call-duration-threshold: 15s
      product-cb:
        sliding-window-size: 30
        minimum-number-of-calls: 15
        failure-rate-threshold: 70
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 5
        slow-call-rate-threshold: 90
        slow-call-duration-threshold: 15s
      payment-cb:
        sliding-window-size: 10
        failure-rate-threshold: 30
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-rate-threshold: 70
        slow-call-duration-threshold: 5s
      tenant-cb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 5s

# -------------------------------------------------------
# Gateway custom properties
# -------------------------------------------------------
gateway:
  jwt:
    secret: ${JWT_SECRET}
  tenant-service:
    base-url: http://tenant-service:8095
  public-paths:
    - /api/v1/auth/**
    - /api/v1/products/**
    - /actuator/**
    - /fallback/**
  load-shedding:
    max-concurrent-requests: ${GATEWAY_MAX_CONCURRENT:5000}

# -------------------------------------------------------
# Eureka
# -------------------------------------------------------
eureka:
  client:
    service-url:
      defaultZone: "http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:eureka-secret-2024}@${EUREKA_HOST:discovery-service}:8761/eureka/"
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

# -------------------------------------------------------
# Actuator
# -------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,gateway
  endpoint:
    health:
      show-details: when-authorized
    gateway:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 0.1  # 10% sampling — use 1.0 only in dev/debugging
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
      # Default 1s+10s=11s times out during startup burst; raise to survive initial trace flush
      connect-timeout: 5s
      read-timeout: 30s
