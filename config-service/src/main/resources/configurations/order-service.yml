server:
  port: 8083
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/order_service_db
    username: ${POSTGRES_USERNAME:vanilson}
    password: ${POSTGRES_PASSWORD:vanilson}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 20

  # Jackson — Phase 3: Instant fields in OrderRequestedEvent must serialise as ISO-8601
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # Kafka Producer (for OrderProducer + OutboxEventPublisher)
  kafka:
    # SASL/PLAIN authentication — credentials injected from environment / Vault
    properties:
      security.protocol: SASL_PLAINTEXT
      sasl.mechanism: PLAIN
      sasl.jaas.config: >
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${KAFKA_USERNAME:kafka}"
        password="${KAFKA_PASSWORD:kafka-secret-2024}";
      # Graceful shutdown — commit offsets before closing
      session.timeout.ms: 30000
      max.poll.interval.ms: 300000
    producer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        acks: all
        retries: 3
        max.in.flight.requests.per.connection: 1

    # Kafka Consumer — saga outcome events (payment.authorized, payment.failed, inventory.insufficient)
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      group-id: order-saga-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "code.with.vanilson.*"
        spring.json.use.type.headers: false

  # Flyway
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    enabled: true
    baseline-version: 0
    repair: true

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:eureka-secret-2024}@${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

# Service URLs (via API Gateway)
application:
  config:
    customer-url: http://${GATEWAY_HOST:localhost}:8222/api/v1/customers
    payment-url:  http://${GATEWAY_HOST:localhost}:8222/api/v1/payments
    product-url:  http://${GATEWAY_HOST:localhost}:8222/api/v1/products

# Resilience4j — Circuit Breakers for CustomerClient (Feign)
resilience4j:
  circuitbreaker:
    instances:
      customer-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3s
  timelimiter:
    instances:
      customer-service:
        timeout-duration: 4s

feign:
  circuitbreaker:
    enabled: true
  client:
    config:
      default:
        connect-timeout: 3000
        read-timeout: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 0.1  # 10% sampling — use 1.0 only in dev/debugging
