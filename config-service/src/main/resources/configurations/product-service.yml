server:
  port: 8082
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/product_service_db
    username: ${POSTGRES_USERNAME:vanilson}
    password: ${POSTGRES_PASSWORD:vanilson}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 120000
      leak-detection-threshold: 60000
      pool-name: ProductServiceHikariPool
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true
        cache.use_second_level_cache: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # Redis L2 Cache
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis-secret-2024}
      # 2s was too tight for Docker DNS + AUTH on first connection; trips RedisReactiveHealthIndicator.
      connect-timeout: 10s
      timeout: 10s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  cache:
    type: redis
    redis:
      time-to-live: 1800000
      cache-null-values: false
    cache-names:
      - products
      - product-list

  # Phase 3 — Kafka (consumer: order.requested, producer: inventory.*)
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    producer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        acks: all
        retries: 3
        max.in.flight.requests.per.connection: 1
        spring.json.add.type.headers: false
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
      group-id: inventory-reservation-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "code.with.vanilson.*"
        spring.json.use.type.headers: false

  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    enabled: true
    baseline-version: 0
    repair: true

eureka:
  client:
    service-url:
      defaultZone: "http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:eureka-secret-2024}@${EUREKA_HOST:discovery-service}:8761/eureka/"
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    enable:
      hikaricp: true
  tracing:
    sampling:
      probability: 0.1  # 10% sampling — use 1.0 only in dev/debugging
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

# JWT secret — must match auth-service and gateway
application:
  config:
    # F7 — order-service base URL for the /internal purchase-verification Feign call (review gate).
    # Direct service-to-service on services-net (bypasses the gateway), same style as order-service's
    # customer-url. The /internal/purchases/exists path is appended by OrderClient.
    order-url: http://${ORDER_SERVICE_HOST:order-service}:8083/api/v1/orders
  security:
    jwt:
      secret-key: ${JWT_SECRET}
    # F7 — shared secret product-service sends as X-Internal-Token on the /internal call. Same
    # value order-service validates (docker-compose env dev default / Vault in prod). Never logged.
    internal-token: ${INTERNAL_SERVICE_TOKEN}

# F7 — Resilience4j + Feign for the order-purchase-verification client.
# Short timeouts so a slow/absent order-service fails the review POST to 503 (B1 fail-closed) in
# ~2s instead of hanging the user; CB opens after repeated failures so we stop hammering it.
resilience4j:
  circuitbreaker:
    instances:
      order-purchase-verification:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3

feign:
  client:
    config:
      default:
        connect-timeout: 3000
        read-timeout: 5000
      order-purchase-verification:
        connect-timeout: 2000
        read-timeout: 2000
