global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: config-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['config-service:8888']

  - job_name: discovery-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['discovery-service:8761']

  - job_name: gateway-api-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['gateway-api-service:8222']

  # Phase 2 — authentication-service
  - job_name: authentication-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['authentication-service:8085']

  - job_name: customer-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['customer-service:8090']

  - job_name: product-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['product-service:8082']

  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['order-service:8083']

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['payment-service:8086']

  # Phase 2 — cart-service
  - job_name: cart-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['cart-service:8091']

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['notification-service:8040']
