# Edge load balancer — único ponto de entrada (host :8080).
# Reload sem downtime: docker exec nginx-edge nginx -s reload

upstream frontend_up {
    # ip_hash: cliente agarrado a UMA instância durante rolling do frontend
    # (evita 404 de assets hashed — spec Z5)
    ip_hash;
    server frontend:80 max_fails=1 fail_timeout=5s;
    server frontend-2:80 max_fails=1 fail_timeout=5s;
}

upstream gateway_up {
    server gateway-api-service:8222 max_fails=1 fail_timeout=5s;
    server gateway-api-service-2:8222 max_fails=1 fail_timeout=5s;
}

server {
    listen 80;
    server_name _;

    # API direto para os gateways (salta o nginx do frontend — spec T6)
    location /api/ {
        proxy_pass http://gateway_up;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        # failover só em falha de ligação/5xx de gateway morto; POST não é
        # retentado (default nginx: métodos não-idempotentes ficam de fora)
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    location / {
        proxy_pass http://frontend_up;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }
}
