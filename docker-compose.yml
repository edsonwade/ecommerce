###############################################################
# docker-compose.yml — SaaS eCommerce Platform (Phase 2)
# Services: 10 Spring Boot apps + full infrastructure
#
# Ports (external access):
#   8888 config-service    8761 discovery-service
#   8222 gateway           8085 authentication-service
#   8090 customer-service  8082 product-service
#   8083 order-service     8086 payment-service
#   8091 cart-service      8040 notification-service
#
# Infrastructure (internal only — no external ports):
#   Kafka, Zookeeper, Redis, PostgreSQL x4, MongoDB, Vault
#
# Observability:
#   9090 Prometheus  3000 Grafana  9411 Zipkin  8025 MailHog
#   8200 Vault UI (dev only — remove in production)
#
# Networks:
#   infra-net     → databases, kafka, redis, vault (internal)
#   services-net  → Spring Boot services + config + discovery
#   monitoring-net→ prometheus, grafana, zipkin
###############################################################

services:

  # ============================================================
  # INFRASTRUCTURE — Secrets Management
  # ============================================================

  vault:
    image: hashicorp/vault:1.16
    container_name: vault
    ports:
      - "8200:8200"   # UI + API — restrict access in production
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-root-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/data
      - ./vault/config:/vault/config:ro
      - ./vault/policies:/vault/policies:ro
    command: [ "vault", "server", "-dev" ]
    # Production: use -config=/vault/config/vault.hcl instead of -dev
    networks: [ infra-net, services-net ]
    healthcheck:
      test: [ "CMD-SHELL", "vault status 2>/dev/null | grep -q 'Initialized'" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # INFRASTRUCTURE — Message Bus
  # ============================================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    # No external port — internal only
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [ infra-net ]
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "2181" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    # Port 9092 exposed for local dev tools (Kafka UI, kafka-cli)
    # Remove in production — services communicate via infra-net on port 29092
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # SASL/PLAIN listeners — PLAINTEXT_HOST for local dev, SASL_PLAINTEXT for internal
      KAFKA_ADVERTISED_LISTENERS: SASL_PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SASL_PLAINTEXT:SASL_PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_ENABLE_IDEMPOTENCE: "true"
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/jaas/kafka_server_jaas.conf"
    volumes:
      - ./kafka/jaas:/etc/kafka/jaas:ro
    networks: [ infra-net ]
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 15s
      timeout: 10s
      retries: 8

  # ============================================================
  # INFRASTRUCTURE — Cache + Rate Limiting
  # ============================================================

  redis:
    image: redis:7.2-alpine
    container_name: redis
    # No external port in production — internal only
    # Keeping for local dev access; remove port binding in production
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
      --requirepass ${REDIS_PASSWORD:-redis-secret-2024}
    volumes:
      - redis-data:/data
    networks: [ infra-net, services-net ]
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis-secret-2024}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # INFRASTRUCTURE — Databases (one per service, internal only)
  # ============================================================

  postgres-order:
    image: postgres:15-alpine
    container_name: postgres-order
    environment:
      POSTGRES_DB: order_service_db
      POSTGRES_USER: ${POSTGRES_USERNAME:-vanilson}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vanilson}
    # No external port — internal only. Access via: docker exec postgres-order psql
    volumes:
      - postgres-order-data:/var/lib/postgresql/data
    networks: [ infra-net ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-vanilson} -d order_service_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-product:
    image: postgres:15-alpine
    container_name: postgres-product
    environment:
      POSTGRES_DB: product_service_db
      POSTGRES_USER: ${POSTGRES_USERNAME:-vanilson}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vanilson}
    volumes:
      - postgres-product-data:/var/lib/postgresql/data
    networks: [ infra-net ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-vanilson} -d product_service_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:15-alpine
    container_name: postgres-payment
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: ${POSTGRES_USERNAME:-vanilson}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vanilson}
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
    networks: [ infra-net ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-vanilson} -d payment_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-auth:
    image: postgres:15-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${POSTGRES_USERNAME:-vanilson}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vanilson}
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    networks: [ infra-net ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-vanilson} -d auth_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    # No external port — internal only
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-vanilson}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-vanilson}
    volumes:
      - mongodb-data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks: [ infra-net ]
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # INFRASTRUCTURE — Observability
  # ============================================================

  zipkin:
    image: openzipkin/zipkin:3
    container_name: zipkin
    ports:
      - "9411:9411"
    volumes:
      - zipkin-data:/zipkin
    networks: [ monitoring-net, services-net ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9411/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config-service/src/main/resources/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config-service/src/main/resources/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks: [ monitoring-net, services-net ]
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy | grep -q Prometheus" ]
      interval: 15s
      timeout: 5s
      retries: 5

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks: [ monitoring-net, services-net ]
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/tmp/loki
    command: -config.file=/etc/loki/loki-config.yml
    networks: [ monitoring-net, services-net ]
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:2.9.8
    container_name: promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    networks: [ monitoring-net, services-net ]

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-Gr@fana#Secure2024}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    networks: [ monitoring-net ]

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks: [ services-net ]

  # ============================================================
  # SPRING CLOUD INFRASTRUCTURE
  # ============================================================

  config-service:
    build:
      context: ./config-service
      dockerfile: Dockerfile
    container_name: config-service
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: native
      VAULT_ENABLED: ${VAULT_ENABLED:-true}
      VAULT_HOST: ${VAULT_HOST:-vault}
      VAULT_PORT: ${VAULT_PORT:-8200}
      VAULT_TOKEN: ${VAULT_TOKEN:-root-token}
    networks: [ services-net, infra-net ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8888/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 8
    restart: on-failure

  discovery-service:
    build:
      context: ./discovery-service
      dockerfile: Dockerfile
    container_name: discovery-service
    ports:
      - "8761:8761"
    depends_on:
      config-service:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      EUREKA_HOST: discovery-service
      EUREKA_USERNAME: ${EUREKA_USERNAME:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret-2024}
      VAULT_ENABLED: ${VAULT_ENABLED:-true}
      VAULT_HOST: ${VAULT_HOST:-vault}
      VAULT_TOKEN: ${VAULT_TOKEN:-root-token}
    networks: [ services-net, infra-net ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 8
    restart: on-failure

  # ============================================================
  # APPLICATION SERVICES
  # ============================================================

  gateway-api-service:
    build:
      context: ./gateway-api-service
      dockerfile: Dockerfile
    container_name: gateway-api-service
    ports:
      - "8222:8222"
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      EUREKA_HOST: discovery-service
      EUREKA_USERNAME: ${EUREKA_USERNAME:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret-2024}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-secret-2024}
      JWT_SECRET: ${JWT_SECRET:-bXlTdXBlclNlY3VyZVNlY3JldEtleUZvckpXVEF1dGgxMjM0NTY3ODk=}
      GATEWAY_MAX_CONCURRENT: 5000
      VAULT_ENABLED: ${VAULT_ENABLED:-true}
      VAULT_HOST: ${VAULT_HOST:-vault}
      VAULT_TOKEN: ${VAULT_TOKEN:-root-token}
    networks: [ services-net, infra-net ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8222/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 8
    restart: on-failure

  authentication-service:
    build:
      context: ./authentication-service
      dockerfile: Dockerfile
    container_name: authentication-service
    ports:
      - "8085:8085"
    depends_on:
      config-service:
        condition: service_healthy
      postgres-auth:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      EUREKA_HOST: discovery-service
      EUREKA_USERNAME: ${EUREKA_USERNAME:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret-2024}
      POSTGRES_HOST: postgres-auth
      POSTGRES_USERNAME: ${POSTGRES_USERNAME:-vanilson}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vanilson}
      JWT_SECRET: ${JWT_SECRET:-bXlTdXBlclNlY3VyZVNlY3JldEtleUZvckpXVEF1dGgxMjM0NTY3ODk=}
      VAULT_ENABLED: ${VAULT_ENABLED:-true}
      VAULT_HOST: ${VAULT_HOST:-vault}
      VAULT_TOKEN: ${VAULT_TOKEN:-root-token}
    networks: [ services-net, infra-net ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8085/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 8
    restart: on-failure

  customer-service:
    build:
      context: ./customer-service
      dockerfile: Dockerfile
    container_name: customer-service
    ports:
      - "8090:8090"
    depends_on:
      config-service:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      EUREKA_HOST: discovery-service
      EUREKA_USERNAME: ${EUREKA_USERNAME:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret-2024}
      MONGO_HOST: mongodb
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-secret-2024}
      VAULT_ENABLED: ${VAULT_ENABLED:-true}
      VAULT_HOST: ${VAULT_HOST:-vault}
      VAULT_TOKEN: ${VAULT_TOKEN:-root-token}
    networks: [ services-net, infra-net ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8090/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 8
    restart: on-failure

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "8082:8082"
    depends_on:
      config-service:
        condition: service_healthy
      postgres-product:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      EUREKA_HOST: discovery-service
      EUREKA_USERNAME: ${EUREKA_USERNAME:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret-2024}
      POSTGRES_HOST: postgres-product
      POSTGRES_USERNAME: ${POSTGRES_USERNAME:-vanilson}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vanilson}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-secret-2024}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_USERNAME: ${KAFKA_USERNAME:-kafka}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD:-kafka-secret-2024}
      VAULT_ENABLED: ${VAULT_ENABLED:-true}
      VAULT_HOST: ${VAULT_HOST:-vault}
      VAULT_TOKEN: ${VAULT_TOKEN:-root-token}
    networks: [ services-net, infra-net ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 8
    restart: on-failure

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8083:8083"
    depends_on:
      config-service:
        condition: service_healthy
      postgres-order:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      EUREKA_HOST: discovery-service
      EUREKA_USERNAME: ${EUREKA_USERNAME:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret-2024}
      POSTGRES_HOST: postgres-order
      POSTGRES_USERNAME: ${POSTGRES_USERNAME:-vanilson}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vanilson}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_USERNAME: ${KAFKA_USERNAME:-kafka}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD:-kafka-secret-2024}
      GATEWAY_HOST: gateway-api-service
      VAULT_ENABLED: ${VAULT_ENABLED:-true}
      VAULT_HOST: ${VAULT_HOST:-vault}
      VAULT_TOKEN: ${VAULT_TOKEN:-root-token}
    networks: [ services-net, infra-net ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 8
    restart: on-failure

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8086:8086"
    depends_on:
      config-service:
        condition: service_healthy
      postgres-payment:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      EUREKA_HOST: discovery-service
      EUREKA_USERNAME: ${EUREKA_USERNAME:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret-2024}
      POSTGRES_HOST: postgres-payment
      POSTGRES_USERNAME: ${POSTGRES_USERNAME:-vanilson}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vanilson}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_USERNAME: ${KAFKA_USERNAME:-kafka}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD:-kafka-secret-2024}
      VAULT_ENABLED: ${VAULT_ENABLED:-true}
      VAULT_HOST: ${VAULT_HOST:-vault}
      VAULT_TOKEN: ${VAULT_TOKEN:-root-token}
    networks: [ services-net, infra-net ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8086/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 8
    restart: on-failure

  cart-service:
    build:
      context: ./cart-service
      dockerfile: Dockerfile
    container_name: cart-service
    ports:
      - "8091:8091"
    depends_on:
      config-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      EUREKA_HOST: discovery-service
      EUREKA_USERNAME: ${EUREKA_USERNAME:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret-2024}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-secret-2024}
      VAULT_ENABLED: ${VAULT_ENABLED:-true}
      VAULT_HOST: ${VAULT_HOST:-vault}
      VAULT_TOKEN: ${VAULT_TOKEN:-root-token}
    networks: [ services-net, infra-net ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8091/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 8
    restart: on-failure

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8040:8040"
    depends_on:
      config-service:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      EUREKA_HOST: discovery-service
      EUREKA_USERNAME: ${EUREKA_USERNAME:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka-secret-2024}
      MONGO_HOST: mongodb
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_USERNAME: ${KAFKA_USERNAME:-kafka}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD:-kafka-secret-2024}
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_USERNAME: noreply@vanilsonshop.io
      MAIL_PASSWORD: unused
      VAULT_ENABLED: ${VAULT_ENABLED:-true}
      VAULT_HOST: ${VAULT_HOST:-vault}
      VAULT_TOKEN: ${VAULT_TOKEN:-root-token}
    networks: [ services-net, infra-net ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8040/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 8
    restart: on-failure

# ============================================================
# NETWORKS — Segmented for security
# ============================================================
networks:
  # Internal infrastructure: databases, kafka, redis, vault, mongodb
  # No external access; only services that explicitly need infra are connected
  infra-net:
    driver: bridge
    internal: false   # Set to true in production (breaks DNS for external-facing needs)

  # Application network: Spring Boot services communicate here
  services-net:
    driver: bridge

  # Monitoring network: Prometheus, Grafana, Zipkin
  monitoring-net:
    driver: bridge

# ============================================================
# VOLUMES
# ============================================================
volumes:
  vault-data:
  redis-data:
  postgres-order-data:
  postgres-product-data:
  postgres-payment-data:
  postgres-auth-data:
  mongodb-data:
  prometheus-data:
  alertmanager-data:
  loki-data:
  grafana-data:
  zipkin-data:
