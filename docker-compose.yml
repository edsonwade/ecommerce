# ============================================================
# NETWORKS — Segmented for security
# ============================================================
networks:
  # Internal infrastructure: databases, kafka, redis, vault, mongodb
  # No external access; only services that explicitly need infra are connected
  infra-net:
    driver: bridge
    internal: false   # Set to true in production (breaks DNS for external-facing needs)

  # Application network: Spring Boot services communicate here
  services-net:
    driver: bridge

  # Monitoring network: Prometheus, Grafana, Zipkin
  monitoring-net:
    driver: bridge

# ============================================================
# VOLUMES
# ============================================================
volumes:
  vault-data:
  redis-data:
  postgres-order-data:
  postgres-product-data:
  postgres-payment-data:
  postgres-auth-data:
  postgres-tenant-data:
  mongodb-data:
  prometheus-data:
  alertmanager-data:
  loki-data:
  grafana-data:
  zipkin-data:
