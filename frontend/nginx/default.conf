server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml font/woff2;
    gzip_min_length 1000;
    gzip_vary on;

    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'" always;

    # ── Static assets (hashed, immutable) ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API reverse proxy to Spring Cloud Gateway ──
    location /api/ {
        # Re-resolve the gateway's IP at runtime via Docker's embedded DNS (127.0.0.11)
        # instead of caching it once at nginx startup. Without this, recreating the
        # gateway container (e.g. any backend rebuild that gives it a new IP) leaves
        # nginx proxying to the DEAD old IP → every /api call 502s until the frontend
        # container is ALSO restarted. Putting the upstream in a variable forces nginx
        # to consult the resolver per request; valid=10s bounds recovery to ~10s.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $gateway_upstream http://gateway-api-service:8222;
        proxy_pass $gateway_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # ── Upstream health probe (for the container HEALTHCHECK only) ──
    # Proxies to the gateway's REAL health path (/actuator/health, NOT under /api).
    # Goes through the same resolver+variable path, so a stale/dead gateway IP makes
    # this return 502 → the frontend container is correctly marked UNHEALTHY. A 200
    # here means nginx can reach a live gateway. Not linked from the SPA.
    location = /healthz/upstream {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $gw_health http://gateway-api-service:8222/actuator/health;
        proxy_pass $gw_health;
        access_log off;
    }

    # ── SPA fallback ──
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
