gateway.tenant.cancelled=Access denied: tenant [{0}] account has been cancelled.
gateway.tenant.not.found=Tenant not found. Please verify your authentication token.
gateway.tenant.service.unavailable=Tenant validation service is temporarily unavailable. Please try again shortly.
gateway.log.tenant.validated=Tenant validated successfully: tenantId=[{0}] status=[{1}] rateLimit=[{2}]
gateway.log.tenant.rejected=Tenant rejected: tenantId=[{0}] status=[{1}] path=[{2}]
