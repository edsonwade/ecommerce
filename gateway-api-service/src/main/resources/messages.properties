# ============================================================
# GATEWAY SERVICE — messages.properties
# All user-facing messages and log messages live here.
# Access via MessageSource — NEVER hardcode strings in classes.
# ============================================================

# --- JWT / Authentication ---
gateway.auth.missing.token=Request rejected: Authorization header missing or invalid.
gateway.auth.invalid.token=Invalid or expired JWT token. Please authenticate again.
gateway.auth.expired.token=Session expired. Please log in again.
gateway.auth.malformed.token=Malformed JWT token. Access denied.
gateway.auth.unsupported.token=Unsupported token type. Access denied.
gateway.auth.signature.invalid=Invalid token signature. Access denied.
gateway.auth.forbidden=Access denied: insufficient permissions for this resource.

# --- Rate Limiting ---
gateway.ratelimit.exceeded=Request limit exceeded. Try again in {0} seconds.
gateway.ratelimit.tenant.exceeded=Request limit for tenant [{0}] exceeded. Consider upgrading your plan.

# --- Circuit Breaker / Fallback ---
gateway.fallback.orders=Order service temporarily unavailable. Please try again in a moment.
gateway.fallback.products=Product service temporarily unavailable. Please try again in a moment.
gateway.fallback.customers=Customer service temporarily unavailable. Please try again in a moment.
gateway.fallback.payments=Payment service temporarily unavailable. Please try again in a moment.
gateway.fallback.carts=Cart service temporarily unavailable. Your cart is saved. Try again in a moment.
gateway.fallback.generic=The requested service is temporarily unavailable. Try again later.

# --- Load Shedding ---
gateway.loadshedding.rejected=System under high load. Request rejected to protect the service. Try again in {0} seconds.

# --- Generic Errors ---
gateway.error.internal=Internal error in gateway. Reference: {0}
gateway.error.internal.user=An unexpected error occurred. Please try again later.
gateway.error.route.not.found=Route not found for path: {0}
gateway.error.service.unavailable=Service [{0}] unavailable at the moment.

# --- Logs ---
gateway.log.request.received=Request received: method=[{0}] path=[{1}] tenant=[{2}] requestId=[{3}]
gateway.log.jwt.validated=JWT validated successfully: userId=[{0}] tenantId=[{1}] role=[{2}]
gateway.log.jwt.rejected=JWT rejected: reason=[{0}] ip=[{1}]
gateway.log.ratelimit.applied=Rate limit applied: tenant=[{0}] bucket=[{1}] remainingTokens=[{2}]
gateway.log.ratelimit.exceeded=Rate limit exceeded: tenant=[{0}] ip=[{1}] path=[{2}]
gateway.log.circuitbreaker.open=Circuit breaker open for service: [{0}]. Redirecting to fallback.
gateway.log.circuitbreaker.halfopen=Circuit breaker in half-open for service: [{0}]. Testing recovery.
gateway.log.circuitbreaker.closed=Circuit breaker closed for service: [{0}]. Service recovered.
gateway.log.loadshedding.triggered=Load shedding triggered: active_requests=[{0}] limit=[{1}] path=[{2}]
gateway.log.fallback.triggered=Fallback triggered for route=[{0}] reason=[{1}]
gateway.log.filter.start=Filter [{0}] started for request [{1}]

# --- Tenant Validation (Phase 4) ---
gateway.tenant.suspended=Access denied: tenant [{0}] is suspended. Please contact support.
gateway.tenant.cancelled=Access denied: tenant [{0}] account has been cancelled.
gateway.tenant.not.found=Tenant not found. Please verify your authentication token.
gateway.tenant.service.unavailable=Tenant validation service is temporarily unavailable. Please try again shortly.
gateway.log.tenant.validated=Tenant validated successfully: tenantId=[{0}] status=[{1}] rateLimit=[{2}]
gateway.log.tenant.rejected=Tenant rejected: tenantId=[{0}] status=[{1}] path=[{2}]
