# ============================================================
# GATEWAY SERVICE — messages.properties
# All user-facing messages and log messages live here.
# Access via MessageSource — NEVER hardcode strings in classes.
# ============================================================

# --- JWT / Authentication ---
gateway.auth.missing.token=Requisição rejeitada: cabeçalho Authorization ausente ou inválido.
gateway.auth.invalid.token=Token JWT inválido ou expirado. Por favor, autentique-se novamente.
gateway.auth.expired.token=Sessão expirada. Por favor, faça login novamente.
gateway.auth.malformed.token=Token JWT malformado. Acesso negado.
gateway.auth.unsupported.token=Tipo de token não suportado. Acesso negado.
gateway.auth.signature.invalid=Assinatura do token inválida. Acesso negado.
gateway.auth.forbidden=Acesso negado: permissões insuficientes para este recurso.

# --- Rate Limiting ---
gateway.ratelimit.exceeded=Limite de requisições excedido. Tente novamente em {0} segundos.
gateway.ratelimit.tenant.exceeded=Limite de requisições do tenant [{0}] excedido. Considere fazer upgrade do plano.

# --- Circuit Breaker / Fallback ---
gateway.fallback.orders=Serviço de pedidos temporariamente indisponível. Por favor, tente novamente em instantes.
gateway.fallback.products=Serviço de produtos temporariamente indisponível. Por favor, tente novamente em instantes.
gateway.fallback.customers=Serviço de clientes temporariamente indisponível. Por favor, tente novamente em instantes.
gateway.fallback.payments=Serviço de pagamentos temporariamente indisponível. Por favor, tente novamente em instantes.
gateway.fallback.carts=Serviço de carrinho temporariamente indisponível. O seu carrinho está guardado. Tente novamente em instantes.
gateway.fallback.generic=O serviço solicitado está temporariamente indisponível. Tente novamente mais tarde.

# --- Load Shedding ---
gateway.loadshedding.rejected=Sistema sob alta carga. Requisição rejeitada para proteger o serviço. Tente novamente em {0} segundos.

# --- Generic Errors ---
gateway.error.internal=Erro interno no gateway. Referência: {0}
gateway.error.route.not.found=Rota não encontrada para o caminho: {0}
gateway.error.service.unavailable=Serviço [{0}] indisponível no momento.

# --- Logs ---
gateway.log.request.received=Requisição recebida: método=[{0}] caminho=[{1}] tenant=[{2}] requestId=[{3}]
gateway.log.jwt.validated=JWT validado com sucesso: userId=[{0}] tenantId=[{1}] role=[{2}]
gateway.log.jwt.rejected=JWT rejeitado: motivo=[{0}] ip=[{1}]
gateway.log.ratelimit.applied=Rate limit aplicado: tenant=[{0}] bucket=[{1}] tokensRestantes=[{2}]
gateway.log.ratelimit.exceeded=Rate limit excedido: tenant=[{0}] ip=[{1}] caminho=[{2}]
gateway.log.circuitbreaker.open=Circuit breaker aberto para serviço: [{0}]. Redirecionando para fallback.
gateway.log.circuitbreaker.halfopen=Circuit breaker em half-open para serviço: [{0}]. Testando recuperação.
gateway.log.circuitbreaker.closed=Circuit breaker fechado para serviço: [{0}]. Serviço recuperado.
gateway.log.loadshedding.triggered=Load shedding ativado: requisições_ativas=[{0}] limite=[{1}] caminho=[{2}]
gateway.log.fallback.triggered=Fallback ativado para rota=[{0}] motivo=[{1}]
gateway.log.filter.start=Filtro [{0}] iniciado para requisição [{1}]

