# ==============================================================
# Grafana Datasource Provisioning
# Auto-configures Prometheus and Loki datasources
# ==============================================================
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: "15s"
      httpMethod: POST
    editable: false

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceName: Zipkin
          matcherRegex: '"traceId":"(\w+)"'
          name: TraceID
          url: 'http://localhost:9411/zipkin/traces/${__value.raw}'
    editable: false

  - name: Zipkin
    type: zipkin
    access: proxy
    url: http://zipkin:9411
    editable: false
