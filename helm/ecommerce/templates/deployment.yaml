{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $name }}
    tier: application
    {{ include "ecommerce.labels" $ | nindent 4 }}
spec:
  replicas: {{ $svc.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
        tier: application
    spec:
      containers:
        - name: {{ $name }}
          image: {{ printf "%s/%s:%s" $.Values.global.imageRegistry $svc.image.repository $svc.image.tag }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
              protocol: TCP
          resources:
            requests:
              cpu: {{ $svc.resources.requests.cpu }}
              memory: {{ $svc.resources.requests.memory }}
            limits:
              cpu: {{ $svc.resources.limits.cpu }}
              memory: {{ $svc.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ $svc.port }}
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ $svc.port }}
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: {{ $svc.port }}
            failureThreshold: 30
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: {{ $name }}-config
            - secretRef:
                name: {{ $name }}-secret
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: MANAGEMENT_TRACING_SAMPLING_PROBABILITY
              value: {{ $.Values.global.tracingSamplingRate | quote }}
            - name: LOGGING_LEVEL_ROOT
              value: {{ $.Values.global.logLevel }}
{{- end }}
