{{- range $name, $svc := .Values.services }}
{{- if $svc.pdb }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $name }}-pdb
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $name }}
    {{ include "ecommerce.labels" $ | nindent 4 }}
spec:
  minAvailable: {{ $svc.pdb.minAvailable | default 1 }}
  selector:
    matchLabels:
      app: {{ $name }}
{{- end }}
{{- end }}
