# values-staging.yaml — Staging environment overrides
# Usage: helm upgrade --install ecommerce ./helm/ecommerce -f values-staging.yaml -n ecommerce-staging

global:
  logLevel: DEBUG
  tracingSamplingRate: "1.0"   # 100% tracing in staging
  externalSecrets:
    enabled: false   # Kind cluster in CI has no External Secrets Operator or Vault backend
  secrets:
    postgresPassword: "staging-postgres-pass"
    mongoPassword: "staging-mongo-pass"
    jwtSecret: "staging-jwt-secret-for-ci-testing-only-32b"
    kafkaPassword: "staging-kafka-pass"
    redisPassword: "staging-redis-pass"
    vaultToken: "root-token"
    eurekaPassword: "staging-eureka-pass"

ingress:
  enabled: true
  host: staging.ecommerce.vanilsonshop.io
  tls:
    enabled: true
    selfSigned: true
    secretName: ecommerce-staging-tls

# All services: 1 replica, smaller resources for staging cost savings
services:
  gateway-api-service:
    replicaCount: 1
    resources:
      requests:
        cpu: 125m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    hpa:
      minReplicas: 1
      maxReplicas: 3

  authentication-service:
    replicaCount: 1
    resources:
      requests:
        cpu: 125m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  customer-service:
