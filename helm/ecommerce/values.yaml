# values.yaml — Default values (dev environment)
# Override with values-staging.yaml or values-production.yaml

global:
  imageRegistry: ghcr.io/vanilsonshop
  imagePullPolicy: IfNotPresent
  logLevel: DEBUG
  tracingSamplingRate: "1.0"
  namespace: ecommerce

ingress:
  enabled: false
  className: nginx
  host: ecommerce.local
  tls:
    enabled: false
    secretName: ecommerce-tls

services:
  gateway-api-service:
    image:
      repository: gateway-api-service
      tag: latest
    replicaCount: 1
    port: 8222
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
    pdb:
      minAvailable: 1

  authentication-service:
    image:
      repository: authentication-service
      tag: latest
    replicaCount: 1
    port: 8085
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    hpa:
