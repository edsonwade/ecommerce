---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-api-service
  namespace: ecommerce
  labels:
    app: gateway-api-service
    tier: application
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gateway-api-service
  template:
    metadata:
      labels:
        app: gateway-api-service
        tier: application
    spec:
      containers:
        - name: gateway-api-service
          image: ghcr.io/vanilsonshop/gateway-api-service:latest
          ports:
            - containerPort: 8222
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8222
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8222
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8222
            failureThreshold: 30
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: gateway-api-service-config
            - secretRef:
                name: gateway-api-service-secret
