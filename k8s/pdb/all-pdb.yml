---
# Gateway PDB: minAvailable=2 (ensures 2 always up during rolling updates)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway-api-service-pdb
  namespace: ecommerce
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: gateway-api-service
---
