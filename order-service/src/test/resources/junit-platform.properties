# NOTE: cucumber.glue and cucumber.features are intentionally NOT set here.
# Module-global values for those keys win over each @Suite's own
# @ConfigurationParameter/@SelectClasspathResource, so they would leak the main
# POJO suite's features+glue into MonitoringCucumberRunner (which then tried to
# run the Kafka saga scenarios under a Spring context and hung). Each runner now
# declares its own features + glue via annotations instead.
cucumber.plugin=pretty, html:target/cucumber-reports/order-bdd-report.html
cucumber.publish.quiet=true
# The main order BDD suite is plain-Mockito (no Spring context). Adding
# cucumber-spring to the classpath makes Cucumber auto-select SpringFactory,
# which then demands @CucumberContextConfiguration on every glue class. Pin the
# POJO factory as the module default; MonitoringCucumberRunner overrides it back
# to SpringFactory for its own Spring-backed scenarios.
cucumber.object-factory=io.cucumber.core.backend.DefaultObjectFactory
