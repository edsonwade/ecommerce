# ============================================================
# PAYMENT SERVICE — messages.properties
# All user-facing and log messages defined here.
# Access via MessageSource — NEVER hardcode strings in classes.
# ============================================================

# --- Payment creation ---
payment.created.success=Payment processed successfully. ID: [{0}]
payment.duplicate.idempotency=Duplicate payment detected for reference [{0}]. Returning previous result.
payment.method.required=Payment method is required.
payment.amount.invalid=Payment amount must be positive.
payment.order.id.required=Order ID is required.
payment.order.reference.required=Order reference is required.
payment.customer.required=Customer data is required.

# --- Payment not found ---
payment.not.found=Payment with ID [{0}] not found.
payment.order.not.found=No payment found for order [{0}].

# --- Idempotency ---
payment.idempotency.key.generated=Idempotency key generated: [{0}] for orderReference=[{1}]
payment.idempotency.duplicate.detected=Duplicate payment detected. Key=[{0}] orderReference=[{1}]
payment.idempotency.new.processing=New payment. Processing: key=[{0}] orderReference=[{1}]

# --- Notification ---
payment.notification.sent=Payment notification sent via Kafka for orderReference=[{0}]
payment.notification.failed=Failed to send payment notification for orderReference=[{0}]. Error: [{1}]

# --- Generic errors ---
payment.error.internal=Internal error processing payment. Reference: [{0}]
payment.error.unexpected=An unexpected error occurred. Please try again.
payment.error.bad.request=Request body missing or malformed.

# --- Validation (Bean Validation) ---
payment.validation.amount.positive=Payment amount must be a positive number.
payment.validation.method.required=Payment method is required.
payment.validation.order.required=Order ID is required.
payment.validation.reference.required=Order reference is required.
payment.validation.customer.required=Customer data is required.

# --- Logs ---
payment.log.processing=Processing payment: orderId=[{0}] orderReference=[{1}] amount=[{2}] method=[{3}]
payment.log.saved=Payment saved: paymentId=[{0}] orderId=[{1}] amount=[{2}]
payment.log.notification.sending=Sending Kafka notification for: orderReference=[{0}] customerEmail=[{1}]
payment.log.all.found=Payment listing: total=[{0}]
payment.log.found.by.id=Payment found: paymentId=[{0}]
