# ============================================================
# PRODUCT SERVICE — messages.properties
# All user-facing and log messages defined here.
# Access via MessageSource — NEVER hardcode strings in classes.
# ============================================================

# --- Product not found ---
product.not.found=Product with ID [{0}] not found.
product.list.empty=No products found.

# --- Product null / invalid ---
product.null=Product cannot be null.
product.id.null=Product ID cannot be null.
product.category.null=Product category cannot be null.
product.name.null=Product name cannot be null.
product.description.null=Product description cannot be null.
product.price.null=Product price cannot be null.
product.quantity.negative=Available quantity must be greater than or equal to zero.
product.list.null.or.empty=Product list cannot be null or empty.

# --- Purchase ---
product.purchase.insufficient.stock=Insufficient stock for product with ID [{0}]. available: [{1}], requested: [{2}].
product.purchase.not.found=One or more products in the order do not exist: missing IDs [{0}].
product.purchase.list.empty=Purchase list cannot be empty.
# Fase 3: SUSPENDED product on the purchase path (REST purchase + Kafka reservation).
product.suspended=Product with ID [{0}] is suspended and cannot be purchased.

# --- Access control / ownership ---
product.access.denied=You are not allowed to modify this product. Only the owner or an ADMIN can make changes.
seller.not.approved=Your seller account is pending approval. You can manage products once an administrator approves it.
seller.suspended=Your seller account is suspended. Contact support to restore access.
product.log.ownership.stamp=Product ownership set: productId=[{0}] createdBy=[{1}]
product.log.ownership.update=Product updated by: productId=[{0}] updatedBy=[{1}]

# --- Generic errors ---
product.error.internal=Internal error processing product. Reference: [{0}]
product.error.internal.user=An unexpected error occurred. Please try again later.
product.error.unexpected=An unexpected error occurred. Please try again.
error.resource.not.found=The requested resource was not found.

# --- Validation ---
product.validation.failed=Invalid data in product request.
# Fase 3: PATCH /products/{id}/status with a value outside ACTIVE|SUSPENDED.
product.status.invalid=Invalid product status. Allowed values: ACTIVE, SUSPENDED.
# Malformed/unreadable JSON request body (Jackson binding failure).
product.request.unreadable=Malformed or invalid request body.

# --- Logs ---
product.log.all.found=Product listing: total=[{0}]
product.log.mine.found=Seller product listing: total=[{0}] createdBy=[{1}]
product.log.found.by.id=Product found: id=[{0}] name=[{1}]
product.log.created=Product created: id=[{0}] name=[{1}]
product.log.updated=Product updated: id=[{0}] name=[{1}]
product.log.deleted=Product deleted: id=[{0}]
product.log.status.changed=Product status changed: id=[{0}] status=[{1}]
product.log.admin.list=Admin product listing: total=[{0}]
product.log.purchase.start=Starting product purchase: total=[{0}] items
product.log.purchase.item=Reserving product: id=[{0}] requested_qty=[{1}] available_qty=[{2}]
product.log.purchase.complete=Purchase processed successfully: [{0}] products reserved
product.log.stock.updated=Stock updated: productId=[{0}] newQty=[{1}]

# --- Category management (Fase 4) ---
category.not.found=Category with ID [{0}] not found.
category.name.exists=A category with the name [{0}] already exists.
category.delete.has.products=Category [{0}] cannot be deleted because [{1}] product(s) still reference it.
category.log.created=Category created: id=[{0}] name=[{1}]
category.log.updated=Category updated: id=[{0}] name=[{1}]
category.log.deleted=Category deleted: id=[{0}]
