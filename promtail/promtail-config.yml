# ==============================================================
# Promtail Configuration — Ships container logs to Loki
# ==============================================================
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: ecommerce

scrape_configs:
  - job_name: docker-containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker-logs
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            time: time
            tag: attrs.tag

      - json:
          source: log
          expressions:
            app: app
            level: level
            traceId: traceId
            spanId: spanId
            tenantId: tenantId
            message: message

      - labels:
          app:
          level:
          stream:

      - timestamp:
          source: time
          format: RFC3339Nano

      - output:
          source: log

  - job_name: ecommerce-services
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: network
            values: ["e-commerce-microservice_services-net"]

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: container
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      - source_labels: ['__meta_docker_container_image']
        target_label: image

    pipeline_stages:
      - json:
          expressions:
            log: log
      - json:
          source: log
          expressions:
            level: level
            app: app
            traceId: traceId
            message: message
      - labels:
          app:
          level:
      - output:
          source: message
